version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fluxride-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fluxride_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  zookeeper:
    image: bitnami/zookeeper:latest
    container_name: fluxride-zookeeper
    ports:
      - "2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes

  kafka:
    image: bitnami/kafka:latest
    container_name: fluxride-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_ANONYMOUS_LOGIN=yes
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=false
    depends_on:
      - zookeeper

  ride-service:
    build:
      context: ./ride-service
    container_name: fluxride-ride-service
    ports:
      - "3003:3003"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/fluxride_rides?schema=public
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - postgres
      - kafka

  payment-service:
    build:
      context: ./payment-service
    container_name: fluxride-payment-service
    ports:
      - "3004:3004"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/fluxride_db?schema=public
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - postgres
      - kafka

  notification-service:
    build:
      context: ./notification-service
    container_name: fluxride-notification-service
    ports:
      - "3005:3005"
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka

volumes:
  postgres_data:
